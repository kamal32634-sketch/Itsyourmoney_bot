name: 24-7-TON-BOT

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */5 * * *' # Every 5 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    concurrency:
      group: mining-bot
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install python-telegram-bot tonutils

      - name: Ensure DB
        run: touch bot_data.db

      - name: Run Bot
        # 4.8 hours = 288 minutes
        run: timeout 288m python main.py || echo "Cycle Restart"

      - name: Sync Database
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main
          git add bot_data.db
          git commit -m "Auto-update database [skip ci]" || echo "No changes"
          git push origin main
